# Деплой на ideapick.ru — запускается ТОЛЬКО вручную:
# GitHub → Actions → Deploy → Run workflow
name: Deploy

on:
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  SERVER_HOST: 92.118.114.187
  SERVER_USER: ideapick

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_APP_URL: https://ideapick.ru

      - name: Prepare bundle
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Upload
        run: |
          rsync -az --delete --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key" \
            .next/standalone/ "$SERVER_USER@$SERVER_HOST:~/app/"

      - name: Run database migrations
        run: |
          ssh -i ~/.ssh/deploy_key -fN -L 15432:127.0.0.1:5432 "$SERVER_USER@$SERVER_HOST"
          DATABASE_URL="postgres://ideapick:${{ secrets.DB_PASSWORD }}@127.0.0.1:15432/ideapick" pnpm db:migrate

      - name: Restart app
        run: |
          ssh -i ~/.ssh/deploy_key "$SERVER_USER@$SERVER_HOST" \
            'cd ~/app && (pm2 restart ideapick --update-env || pm2 start server.js --name ideapick) && pm2 save'
